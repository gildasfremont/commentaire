<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commentaire</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <article id="document" class="document-column"></article>
    <aside class="comment-column">
      <div class="transcription-header">
        <span class="mic-indicator idle" id="mic-indicator"></span>
        <span id="mic-label">Commentaires</span>
      </div>
      <div class="amplitude-track">
        <div class="amplitude-bar" id="amplitude-bar"></div>
      </div>
      <div id="transcription-list" class="transcription-list"></div>
      <div class="record-bar">
        <button type="button" id="record-btn" class="record-btn">Enregistrer</button>
        <span class="record-hint">Espace pour démarrer / arrêter</span>
      </div>
      <div class="simulate-bar">
        <input type="text" id="simulate-input" placeholder="Taper une question ici et Entrée..." />
      </div>
    </aside>
  </main>
  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
