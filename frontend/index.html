<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commentaire</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <!-- Shared scroll container: document + margin scroll together -->
    <div class="reading-area" id="reading-area">
      <article id="document" class="document-column"></article>
      <div class="comments-margin" id="comments-margin"></div>
    </div>

    <!-- Bottom controls bar -->
    <div class="controls-bar">
      <div class="status-group">
        <span class="mic-indicator idle" id="mic-indicator"></span>
        <span id="mic-label">Commentaires</span>
      </div>
      <div class="amplitude-track">
        <div class="amplitude-bar" id="amplitude-bar"></div>
      </div>
      <button type="button" id="record-btn" class="record-btn">Enregistrer</button>
      <span class="record-hint">Espace</span>
      <input type="text" id="simulate-input" placeholder="Simuler une question (Entrée)…" />
    </div>
  </main>

  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
